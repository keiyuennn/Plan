<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracy Map - Seoul 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        :root { --primary-purple: #9D94FF; --bg-purple: #F9F8FF; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg-purple); margin: 0; padding: 0; min-height: 100vh; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        header { background: #E0DEFF; position: relative; height: 280px; overflow: hidden; }
        header img { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        .banner-mask { border-radius: 35px 35px 0 0; margin-top: -30px; position: relative; background: #ffffff; min-height: 80vh; z-index: 10; padding: 24px; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.4); border-radius: 20px; }
        .time-line::before { content: ''; position: absolute; left: 52px; top: 0; bottom: 0; width: 2px; background: #F0EEFF; }
        .concert-card { border: 2.5px solid #6D63D6 !important; background: #FAF9FF; }
        [v-cloak] { display: none; } /* 防止 Vue 未載入前閃動 */
    </style>
</head>
<body>

<div id="app" v-cloak>
    <header>
        <img src="header.jpg" onerror="this.parentElement.style.background='#E0DEFF'; this.style.display='none'">
        <nav class="absolute bottom-6 right-4 flex space-x-4 p-2 glass-nav z-20 shadow-lg">
            <button v-for="tab in tabs" :key="tab.id" @click="currentTab = tab.id" 
                    :class="currentTab === tab.id ? 'text-[#6D63D6]' : 'text-purple-300'" class="p-2 text-center">
                <i :class="tab.icon" class="text-xl block"></i>
                <span class="text-[9px] font-bold">{{ tab.name }}</span>
            </button>
        </nav>
    </header>

    <main class="banner-mask">
        <div v-show="currentTab === 'schedule'">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black">Trip Schedule</h2>
                <button @click="showAddPlan = true" class="bg-purple-100 text-[#6D63D6] p-2 rounded-xl w-10 h-10"><i class="fa-solid fa-plus"></i></button>
            </div>

            <div class="flex gap-3 overflow-x-auto no-scrollbar mb-6">
                <div v-for="d in dates" :key="d.date" @click="activeDate = d.date"
                     class="flex-shrink-0 w-14 h-20 rounded-2xl flex flex-col items-center justify-center transition-all"
                     :class="activeDate === d.date ? 'bg-[#9D94FF] text-white shadow-md' : 'bg-gray-50 text-purple-200'">
                    <span class="text-xs font-bold">{{ d.day }}</span>
                    <span class="text-[9px] uppercase">{{ d.weekday }}</span>
                </div>
            </div>

            <div class="relative time-line">
                <div v-for="item in dailyPlans" v-show="item.date === activeDate" class="flex gap-4 mb-6 relative">
                    <div class="w-12 text-[10px] font-bold text-purple-400 pt-1">{{ item.time }}</div>
                    <div class="flex-1 bg-white p-4 rounded-3xl border border-purple-50 shadow-sm" :class="{'concert-card': item.isConcert}">
                        <h3 class="font-bold text-sm">{{ item.name }}</h3>
                        <p class="text-[10px] text-gray-400 mt-1">{{ item.note }}</p>
                    </div>
                </div>
            </div>
        </div>

        <div v-show="currentTab === 'info'">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-gray-800">Gallery & Info</h2>
                <label class="bg-purple-100 text-[#6D63D6] p-2 rounded-xl w-10 h-10 flex items-center justify-center cursor-pointer">
                    <i class="fa-solid fa-plus"></i>
                    <input type="file" class="hidden" @change="uploadImage">
                </label>
            </div>
            <div class="bg-purple-50 p-4 rounded-3xl border border-purple-100 mb-6">
                <p class="text-[11px] font-bold text-[#6D63D6] mb-2 uppercase">BTS GOYANG GUIDE</p>
                <ul class="text-[10px] space-y-1 text-gray-600 font-bold">
                    <li>• 11:00 AM 票務開放</li>
                    <li>• 14:10 PM Sound Check 入場</li>
                    <li>• 19:00 PM 演出開始</li>
                </ul>
            </div>
            <div v-for="(img, idx) in infoImages" :key="idx" class="mb-4 rounded-3xl overflow-hidden shadow">
                <img :src="img" class="w-full h-auto">
            </div>
        </div>

        <div v-show="currentTab === 'shopping'">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black">Shopping List</h2>
                <button @click="showAddShopping = true" class="bg-purple-100 text-[#6D63D6] p-2 rounded-xl w-10 h-10"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div v-for="(item, idx) in shoppingList" :key="idx" class="bg-white p-4 rounded-2xl mb-3 flex justify-between items-center border border-gray-100">
                <span class="font-bold text-sm">{{ item }}</span>
                <button @click="shoppingList.splice(idx,1)" class="text-gray-200"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
    </main>

    <div v-if="showAddPlan" class="fixed inset-0 z-[100] bg-black/50 flex items-center justify-center p-6" @click.self="showAddPlan = false">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 shadow-xl">
            <h3 class="font-bold mb-4">新增行程</h3>
            <input v-model="newPlan.time" type="time" class="w-full bg-gray-50 p-3 rounded-xl mb-3 outline-none">
            <input v-model="newPlan.name" placeholder="名稱" class="w-full bg-gray-50 p-3 rounded-xl mb-4 outline-none">
            <button @click="addPlan" class="w-full bg-[#9D94FF] text-white py-3 rounded-xl font-bold">確認添加</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
    // 檢查 Vue 是否成功載入
    window.onload = function() {
        if (typeof Vue === 'undefined') {
            document.body.innerHTML = "<div style='padding:50px; text-align:center;'>腳本載入失敗，請檢查網絡連結。</div>";
            return;
        }
        
        const { createApp, ref, onMounted, watch } = Vue;
        createApp({
            setup() {
                const currentTab = ref('schedule');
                const activeDate = ref('2026-04-11');
                const showAddPlan = ref(false);
                const showAddShopping = ref(false);
                const newPlan = ref({ time: '12:00', name: '' });
                const newItem = ref('');
                
                const infoImages = ref([]);
                const shoppingList = ref(['Tamburins 護手霜']);
                const dailyPlans = ref([
                    {date:'2026-04-09',time:'11:00',name:'票務服務台開放',note:'Goyang Stadium'},
                    {date:'2026-04-11',time:'14:10',name:'Sound Check 入場',note:'ARMY ZONE 驗票'},
                    {date:'2026-04-11',time:'19:00',name:'BTS ARIRANG D1',isConcert:true,note:'7PM Start'},
                    {date:'2026-04-12',time:'19:00',name:'BTS ARIRANG D2',isConcert:true,note:'7PM Start'}
                ]);

                const uploadImage = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => infoImages.value.unshift(ev.target.result);
                        reader.readAsDataURL(file);
                    }
                };

                const addPlan = () => {
                    if (newPlan.value.name) {
                        dailyPlans.value.push({
                            date: activeDate.value,
                            time: newPlan.value.time,
                            name: newPlan.value.name,
                            note: '自訂行程'
                        });
                        dailyPlans.value.sort((a,b) => a.time.localeCompare(b.time));
                        showAddPlan.value = false;
                        newPlan.value.name = '';
                    }
                };

                onMounted(() => {
                    console.log("Tracy Map Loaded");
                });

                return {
                    currentTab, activeDate, dailyPlans, infoImages, shoppingList,
                    showAddPlan, showAddShopping, newPlan, newItem,
                    uploadImage, addPlan,
                    tabs: [
                        {id:'schedule',name:'行程',icon:'fa-solid fa-calendar-day'},
                        {id:'info',name:'資訊',icon:'fa-solid fa-circle-info'},
                        {id:'shopping',name:'清單',icon:'fa-solid fa-basket-shopping'}
                    ],
                    dates: [
                        {weekday:'THU',day:'09',date:'2026-04-09'},
                        {weekday:'SAT',day:'11',date:'2026-04-11'},
                        {weekday:'SUN',day:'12',date:'2026-04-12'}
                    ]
                };
            }
        }).mount('#app');
    };
</script>
</body>
</html>
