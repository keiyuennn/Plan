<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracy Map 救急版</title>
    <style>
        body { font-family: sans-serif; background-color: #f9f8ff; color: #333; margin: 0; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; }
        .header { background: #9d94ff; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .time { color: #6d63d6; font-weight: bold; font-size: 0.9em; }
        .title { font-weight: bold; display: block; margin: 5px 0; }
        .note { color: #888; font-size: 0.8em; }
        .info-title { color: #6d63d6; font-weight: bold; border-bottom: 2px solid #9d94ff; padding-bottom: 5px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Tracy Map - Seoul</h1>
        <p>BTS ARIRANG 演唱會資訊</p>
    </div>

    <h2 class="info-title">📅 行程：4/11 (SAT)</h2>
    <div class="card">
        <span class="time">11:00 AM</span>
        <span class="title">票務處/服務台開放</span>
        <span class="note">地點：高陽體育場 南側 (South)</span>
    </div>
    <div class="card" style="border: 2px solid #6d63d6;">
        <span class="time">07:00 PM</span>
        <span class="title">BTS WORLD TOUR [ARIRANG]</span>
        <span class="note">演出開始</span>
    </div>

    <h2 class="info-title">💡 現場指南</h2>
    <div class="card">
        <span class="title">ARMY ZONE 必備品</span>
        <ul style="font-size: 0.9em; padding-left: 20px;">
            <li>身分證原件 (護照)</li>
            <li>Membership 二維碼</li>
            <li>當日演出門票</li>
        </ul>
    </div>

    <h2 class="info-title">📍 場地分佈</h2>
    <div class="card">
        <p><b>北側 (North):</b> SC手環、一般手環、ARMY ZONE</p>
        <p><b>南側 (South):</b> 票務處、SC櫃台、阿米棒快速櫃台</p>
    </div>

</body>
</html>
